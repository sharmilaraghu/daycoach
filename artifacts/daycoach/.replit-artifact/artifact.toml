kind = "web"
previewPath = "/"
title = "DayCoach"
version = "1.0.0"
id = "artifacts/daycoach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20249

[services.development]
run = "pnpm --filter @workspace/daycoach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/daycoach", "run", "build" ]
publicDir = "artifacts/daycoach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20249"
BASE_PATH = "/"
